<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>จุ๊บแจ๊ง</title>

<style>
body{
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

button{
    background: none;
    border: none;
    cursor: pointer;
}

button img{
    width: 200px;
    transition: 0.2s;
}

button img:active{
    transform: scale(0.8);
}
</style>
</head>

<body>

<button onclick="playSound()">
    <img src="https://i.imgur.com/4AiXzf8.jpeg">
</button>

<audio id="sound" src="sound.mp3"></audio>

<script>
function playSound(){
    var audio = document.getElementById("sound");
    audio.currentTime = 0;   // เล่นใหม่ทุกครั้ง
    audio.play().catch(function(error){
        console.log("เล่นเสียงไม่ได้:", error);
    });
}
</script>

</body>
</html>
